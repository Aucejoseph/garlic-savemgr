name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PS5 Payload SDK
        run: |
          gh release download --repo ps5-payload-dev/sdk --pattern 'ps5-payload-sdk.zip' --dir /tmp
          unzip /tmp/ps5-payload-sdk.zip -d /tmp/ps5-payload-sdk
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: make PS5_PAYLOAD_SDK=/tmp/ps5-payload-sdk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: garlic-savemgr.elf
